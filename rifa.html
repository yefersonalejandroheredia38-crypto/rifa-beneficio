<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Solidaria - Elige tu número</title>
    <!-- Fuentes modernas -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=inter@400,500,600,700,800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS principal -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-rifa">
    <header class="rifa-header">
        <div class="header-top">
            <a href="index.html" class="btn-volver">
                <i class="fas fa-arrow-left"></i> Inicio
            </a>
            <div class="precio-destacado">
                <span class="precio-dolar">$1</span>
                <span class="precio-bsf">(al cambio del día)</span>
            </div>
        </div>
        
        <h1 class="rifa-titulo">
            <i class="fas fa-star"></i>
            Elige tu número de la suerte
            <i class="fas fa-star"></i>
        </h1>

        <!-- CONTADOR REGRESIVO (NUEVO) -->
        <div class="contador-wrapper">
            <i class="fas fa-hourglass-half"></i>
            <span id="contador"></span>
        </div>
        
        <div class="buscador-wrapper">
            <i class="fas fa-search"></i>
            <input type="number" id="buscador" placeholder="Busca tu número (1-1000)" min="1" max="1000">
        </div>
        
        <div class="estado-leyendas">
            <div class="leyenda">
                <span class="cuadro disponible"></span>
                <span>Disponible</span>
            </div>
            <div class="leyenda">
                <span class="cuadro vendido"></span>
                <span>Vendido</span>
            </div>
            <div class="leyenda">
                <span class="cuadro seleccionado"></span>
                <span>Seleccionado</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Contenedor donde se generarán los números -->
        <div id="contenedor-rifa" class="numeros-grid">
            <!-- Mensaje de carga (NUEVO) -->
            <div id="cargando" class="cargando">Cargando números...</div>
        </div>

        <!-- Modal de pago (mejorado con botón copiar y mensaje especial) -->
        <div id="capa-pago" class="modal-estructura oculto">
            <div class="capa-oscura" onclick="cerrarPago()"></div>
            <div class="tarjeta-mensaje glass-effect pago-card">
                <div class="pago-header">
                    <i class="fas fa-check-circle"></i>
                    <h3>Número seleccionado</h3>
                    <div class="numero-seleccionado-grande" id="num-pago">0</div>
                    <p id="mensaje-especial" class="mensaje-especial"></p> <!-- Mensaje especial -->
                </div>
                
                <div class="detalles-banco">
                    <h4><i class="fas fa-university"></i> Datos de pago</h4>
                    <div class="banco-grid">
                        <div class="banco-row">
                            <span>Banco:</span>
                            <strong>0102 (Venezuela)</strong>
                        </div>
                        <div class="banco-row">
                            <span>Cédula:</span>
                            <strong>V-12.345.678</strong>
                        </div>
                        <div class="banco-row">
                            <span>Teléfono:</span>
                            <strong>0412-2415696</strong>
                        </div>
                        <div class="banco-row total">
                            <span>Monto:</span>
                            <strong>$1 (cambio del día)</strong>
                        </div>
                    </div>
                    <!-- Botón copiar datos (NUEVO) -->
                    <button class="btn-copiar" onclick="copiarDatos()">
                        <i class="fas fa-copy"></i> Copiar datos
                    </button>
                </div>
                
                <div class="pago-acciones">
                    <button class="btn-principal" onclick="irAWhatsapp()">
                        <i class="fab fa-whatsapp"></i> Ya pagué, enviar comprobante
                    </button>
                    <button class="btn-secundario" onclick="cerrarPago()">
                        Elegir otro número
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- BOTÓN FLOTANTE DE WHATSAPP -->
    <a href="https://wa.me/584122415696?text=Hola%2C%20tengo%20una%20consulta%20sobre%20la%20rifa" 
       class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Script de la rifa -->
    <script src="script.js"></script>
</body>
</html>
